version: 2.1

jobs:
  build-lint-and-test:
    machine:
      image: ubuntu-2004:current
      docker_layer_caching: true

    steps:
      - checkout
      - run: make docker_build
      - run: make docker_push
      - run: make deps
      - run: make lint
      - run: make test
workflows:
  basic:
    jobs:
      - build-lint-and-test
